<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Display System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('erp.theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <style>
    /* ===== Theme Variables ===== */
    :root {
      --bg-body: #07080c;
      --bg-body-rgb: 7,8,12;
      --bg-card-rgb: 18,20,28;
      --text-primary: #e9eaf0;
      --text-secondary: #b0b3c0;
      --text-muted: #8b8e9b;
      --text-dim: #6b6e7c;
      --overlay-rgb: 255,255,255;
      --accent: #ff6b3d;
      --success: #18b08a;
      --warning: #ffc200;
      --danger: #ff4757;
      --purple: #6b5cff;
    }
    [data-theme="light"] {
      --bg-body: #f4f5f9;
      --bg-body-rgb: 244,245,249;
      --bg-card-rgb: 255,255,255;
      --text-primary: #1a1d26;
      --text-secondary: #4a4d5a;
      --text-muted: #6b6e7c;
      --text-dim: #8b8e9b;
      --overlay-rgb: 0,0,0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }

    /* ===== Header ===== */
    header {
      position: sticky; top: 0; z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px;
      backdrop-filter: blur(20px);
      background: rgba(var(--bg-body-rgb),0.7);
      border-bottom: 1px solid rgba(var(--overlay-rgb),0.06);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--accent);
      
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-title small {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* Stats pills */
    .stats {
      display: flex;
      gap: 8px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(var(--overlay-rgb),0.06);
      background: rgba(var(--bg-card-rgb),0.65);
    }

    .stat-pill .stat-count {
      font-family: 'Space Grotesk', monospace;
      font-size: 16px;
      font-weight: 700;
    }

    .stat-pill.stat-new { border-color: rgba(255,71,87,0.25); }
    .stat-pill.stat-new .stat-count { color: var(--danger); }
    .stat-pill.stat-cooking { border-color: rgba(255,194,0,0.25); }
    .stat-pill.stat-cooking .stat-count { color: var(--warning); }
    .stat-pill.stat-ready { border-color: rgba(24,176,138,0.25); }
    .stat-pill.stat-ready .stat-count { color: #18b08a; }

    .stat-label { color: var(--text-muted); }

    .header-link {
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(var(--overlay-rgb),0.06);
      border: 1px solid rgba(var(--overlay-rgb),0.08);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      font-family: inherit;
      transition: all .15s ease;
    }

    .header-link:hover { background: rgba(var(--overlay-rgb),0.1); color: var(--text-primary); }

    /* ===== Orders Grid ===== */
    .container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      padding: 20px 28px;
      height: calc(100vh - 68px);
      overflow-y: auto;
      align-content: start;
    }

    @media (max-width: 1600px) { .container { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 1200px) { .container { grid-template-columns: repeat(3, 1fr); } }

    /* ===== Order Card ===== */
    .order-card {
      background: rgba(var(--bg-card-rgb),0.65);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(var(--overlay-rgb),0.06);
      border-radius: 16px;
      padding: 18px;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.3s cubic-bezier(.16,1,.3,1);
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .order-card:hover { border-color: rgba(var(--overlay-rgb),0.1); }

    .order-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 16px 16px 0 0;
    }

    @keyframes cardIn {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Status variants */
    .order-card.new::before { background: var(--danger); }

    .order-card.cooking::before { background: var(--warning); }

    .order-card.ready::before { background: var(--success); }

    /* Card header */
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .order-id {
      font-family: 'Space Grotesk', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .order-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .order-card.new .order-badge { background: rgba(255,71,87,0.15); color: var(--danger); }
    .order-card.cooking .order-badge { background: rgba(255,194,0,0.15); color: var(--warning); }
    .order-card.ready .order-badge { background: rgba(24,176,138,0.15); color: #18b08a; }

    .order-time {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 14px;
      font-weight: 500;
    }

    /* Items list */
    .order-items {
      margin-bottom: 14px;
      background: rgba(var(--overlay-rgb),0.02);
      border-radius: 10px;
      border: 1px solid rgba(var(--overlay-rgb),0.04);
      overflow: hidden;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .item + .item { border-top: 1px solid rgba(var(--overlay-rgb),0.04); }

    .item-name { flex: 1; }

    .item-qty {
      font-family: 'Space Grotesk', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      background: rgba(var(--overlay-rgb),0.06);
      padding: 3px 10px;
      border-radius: 6px;
      min-width: 36px;
      text-align: center;
    }

    /* Timer */
    .order-timer {
      font-family: 'Space Grotesk', monospace;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .timer-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .order-timer.ok { color: #18b08a; }
    .order-timer.ok .timer-icon { background: rgba(24,176,138,0.15); }
    .order-timer.warn { color: var(--warning); }
    .order-timer.warn .timer-icon { background: rgba(255,194,0,0.15); }
    .order-timer.critical { color: var(--danger); }
    .order-timer.critical .timer-icon { background: rgba(255,71,87,0.15); }

    /* Action buttons */
    .order-actions {
      display: flex;
      gap: 8px;
    }

    .order-actions button {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s ease;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .order-actions button:hover { transform: translateY(-1px); }
    .order-actions button:active { transform: translateY(0); }

    .btn-start {
      background: var(--warning);
      color: #07080c;
    }
    .btn-start:hover { filter: brightness(1.05); }

    .btn-done {
      background: var(--success);
      color: #fff;
    }
    .btn-done:hover { filter: brightness(1.05); }

    .btn-delay {
      background: rgba(255,71,87,0.12);
      color: var(--danger);
      border: 1px solid rgba(255,71,87,0.2);
    }
    .btn-delay:hover { background: rgba(255,71,87,0.2); }

    /* ===== Empty State ===== */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      text-align: center;
    }

    .empty-state h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(var(--overlay-rgb),0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
      .header-right { gap: 12px; flex-wrap: wrap; }
      .stats { flex-wrap: wrap; }
      .container { padding: 12px 16px; grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      header { padding: 10px 14px; }
      .header-left { width: 100%; }
      .header-right { width: 100%; justify-content: flex-start; flex-wrap: wrap; gap: 8px; }
      .stats { width: 100%; gap: 6px; flex-wrap: nowrap; }
      .stat-pill { flex: 1; justify-content: center; padding: 7px 9px; }
      .header-link { padding: 8px 12px; font-size: 11px; flex: 1; text-align: center; }
      .container { grid-template-columns: 1fr; }
    }

    /* ===== Light Theme ===== */
    [data-theme="light"] header { background: rgba(var(--bg-body-rgb),0.85); border-bottom-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .order-card { background: rgba(255,255,255,0.8); border-color: rgba(0,0,0,0.07); box-shadow: 0 1px 4px rgba(0,0,0,0.05); backdrop-filter: none; }
    [data-theme="light"] .stat-pill { background: rgba(255,255,255,0.8); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .header-link { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: var(--text-muted); }
    [data-theme="light"] .header-link:hover { background: rgba(0,0,0,0.08); color: var(--text-primary); }
    [data-theme="light"] .order-items { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06); }
    [data-theme="light"] .item + .item { border-top-color: rgba(0,0,0,0.06); }
    [data-theme="light"] .item-qty { background: rgba(0,0,0,0.05); color: var(--text-primary); }
    [data-theme="light"] .btn-start { color: #07080c; }
    [data-theme="light"] .btn-done { color: #fff; }
    [data-theme="light"] .btn-delay { background: rgba(255,71,87,0.08); border-color: rgba(255,71,87,0.15); }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="header-title">
        Kitchen Display
        <small>Live order management</small>
      </div>
    </div>
    <div class="header-right">
      <div class="stats">
        <div class="stat-pill stat-new">
          <span class="stat-count" id="countNew">0</span>
          <span class="stat-label">New</span>
        </div>
        <div class="stat-pill stat-cooking">
          <span class="stat-count" id="countCooking">0</span>
          <span class="stat-label">Cooking</span>
        </div>
        <div class="stat-pill stat-ready">
          <span class="stat-count" id="countReady">0</span>
          <span class="stat-label">Ready</span>
        </div>
      </div>
      <button class="header-link" id="themeToggle" onclick="toggleTheme()">Light Mode</button>
      <a href="index.html" class="header-link">← Menu Studio</a>
    </div>
  </header>

  <div class="container" id="ordersContainer">
    <div class="empty-state">
      <h2>No orders yet</h2>
      <p>Waiting for kitchen orders...</p>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'light' ? '' : 'light';
      if (next) html.setAttribute('data-theme', next);
      else html.removeAttribute('data-theme');
      localStorage.setItem('erp.theme', next);
      document.getElementById('themeToggle').textContent = next === 'light' ? 'Dark Mode' : 'Light Mode';
    }
    // Init toggle label
    document.addEventListener('DOMContentLoaded', function() {
      var t = localStorage.getItem('erp.theme');
      if (t === 'light') document.getElementById('themeToggle').textContent = 'Dark Mode';
    });

    let orders = {};
    let audioContext = null;

    document.body.addEventListener('click', () => {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }, { once: true });

    function playNotificationSound() {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.setValueAtTime(600, now + 0.1);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.setValueAtTime(0, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      return date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    }

    function getElapsedSeconds(isoString) {
      const orderTime = new Date(isoString).getTime();
      return Math.floor((Date.now() - orderTime) / 1000);
    }

    function formatTimer(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return mins + ':' + secs.toString().padStart(2, '0');
    }

    function getTimerClass(seconds) {
      if (seconds > 600) return 'critical';
      if (seconds > 300) return 'warn';
      return 'ok';
    }

    function getStatusClass(status, seconds) {
      if (status === 'new') return 'new';
      if (status === 'ready') return 'ready';
      return 'cooking';
    }

    async function updateOrders() {
      try {
        const res = await fetch('/api/orders');
        if (res.ok) {
          const data = await res.json();
          orders = data || {};
          renderOrders();
          return;
        }
      } catch (e) {
        console.log('Server fetch failed (expected on local):', e);
      }

      const stored = localStorage.getItem('whatsappOrders');
      const newOrders = stored ? JSON.parse(stored) : [];

      const orderMap = {};
      newOrders.forEach((order, idx) => {
        const id = 'ORDER-' + idx;
        orderMap[id] = {
          ...order,
          id,
          status: orders[id]?.status || 'new',
          startTime: orders[id]?.startTime || null
        };
      });

      orders = orderMap;
      renderOrders();
    }

    function renderOrders(isInitial = false) {
      const container = document.getElementById('ordersContainer');
      const statusMap = { new: 0, cooking: 0, ready: 0 };

      const sorted = Object.values(orders).sort((a, b) => {
        const statusOrder = { new: 0, cooking: 1, ready: 2 };
        return statusOrder[a.status] - statusOrder[b.status];
      });

      if (sorted.length === 0) {
        container.innerHTML =
          '<div class="empty-state">' +
            '<h2>No orders yet</h2>' +
            '<p>Waiting for kitchen orders...</p>' +
          '</div>';
        updateStats(statusMap);
        return;
      }

      const orderCount = sorted.length;
      const lastCount = container.dataset.orderCount || '0';
      const needsRebuild = isInitial || orderCount !== parseInt(lastCount);

      if (needsRebuild) {
        container.dataset.orderCount = orderCount;
        let html = '';

        sorted.forEach(order => {
          statusMap[order.status]++;
          const items = order.message
            .split('\n')
            .filter(line => line.includes('•'))
            .map(line => {
              const match = line.match(/• (.+?) × (\d+)/);
              return match ? { name: match[1], qty: match[2] } : null;
            })
            .filter(Boolean);

          html +=
            '<div class="order-card" data-order-id="' + order.id + '">' +
              '<div class="order-header">' +
                '<div class="order-id">' + order.id + '</div>' +
                '<div class="order-badge" data-status>' + order.status.toUpperCase() + '</div>' +
              '</div>' +
              '<div class="order-time">' + (order.table ? 'Table ' + order.table + ' · ' : '') + 'Received ' + formatTime(order.timestamp) + '</div>' +
              '<div class="order-items">' +
                items.map(item =>
                  '<div class="item">' +
                    '<span class="item-name">' + item.name + '</span>' +
                    '<span class="item-qty">×' + item.qty + '</span>' +
                  '</div>'
                ).join('') +
              '</div>' +
              '<div class="order-timer" data-timer>0:00</div>' +
              '<div class="order-actions">' +
                (order.status === 'new' ?
                  '<button class="btn-start" data-action="start" data-order="' + order.id + '">Start Cooking</button>' : '') +
                (order.status === 'cooking' ?
                  '<button class="btn-done" data-action="ready" data-order="' + order.id + '">Mark Ready</button>' +
                  '<button class="btn-delay" data-action="delay" data-order="' + order.id + '">Reset</button>' : '') +
                (order.status === 'ready' ?
                  '<button class="btn-done" data-action="pickup" data-order="' + order.id + '">Picked Up</button>' : '') +
              '</div>' +
            '</div>';
        });

        container.innerHTML = html;
      }

      sorted.forEach(order => {
        statusMap[order.status]++;
        const elapsed = getElapsedSeconds(order.timestamp);
        const timerText = formatTimer(elapsed);
        const timerClass = getTimerClass(elapsed);
        const statusClass = getStatusClass(order.status, elapsed);

        const card = container.querySelector('[data-order-id="' + order.id + '"]');
        if (card) {
          card.className = 'order-card ' + statusClass;
          const timerEl = card.querySelector('[data-timer]');
          if (timerEl) {
            timerEl.className = 'order-timer ' + timerClass;
            timerEl.textContent = timerText;
          }
          const statusEl = card.querySelector('[data-status]');
          if (statusEl) statusEl.textContent = order.status.toUpperCase();
        }
      });

      updateStats(statusMap);
    }

    function updateStats(statusMap) {
      document.getElementById('countNew').textContent = statusMap.new;
      document.getElementById('countCooking').textContent = statusMap.cooking;
      document.getElementById('countReady').textContent = statusMap.ready;
    }

    async function startCooking(orderId) {
      if (orders[orderId]) {
        orders[orderId].status = 'cooking';
        orders[orderId].startTime = new Date().toISOString();
        await updateServer(orderId, 'cooking');
        renderOrders();
      }
    }

    async function markReady(orderId) {
      if (orders[orderId]) {
        orders[orderId].status = 'ready';
        await updateServer(orderId, 'ready');
        playNotificationSound();
        renderOrders();
      }
    }

    async function delay(orderId) {
      if (orders[orderId]) {
        orders[orderId].status = 'new';
        await updateServer(orderId, 'new');
        renderOrders();
      }
    }

    async function clearOrder(orderId) {
      delete orders[orderId];
      await updateServer(orderId, 'cleared');
      renderOrders();
    }

    async function updateServer(orderId, status) {
      try {
        await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, status })
        });
      } catch (e) { /* fallback: local only */ }
    }

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const orderId = btn.dataset.order;
      if (action === 'start') startCooking(orderId);
      else if (action === 'ready') markReady(orderId);
      else if (action === 'delay') delay(orderId);
      else if (action === 'pickup') clearOrder(orderId);
    });

    let lastOrderCount = 0;
    setInterval(() => {
      const stored = localStorage.getItem('whatsappOrders');
      const newOrders = stored ? JSON.parse(stored) : [];
      if (newOrders.length !== lastOrderCount) {
        lastOrderCount = newOrders.length;
        updateOrders();
      } else {
        renderOrders(false);
      }
    }, 1000);

    setInterval(() => { updateOrders(); }, 5000);

    updateOrders();
    renderOrders(true);
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
